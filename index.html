<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  <script defer src="bundle.js"></script></head>
  <body>
    <form id="form-project">
      <select id="select-project"></select>
      <input type="text" id="project-name" placeholder="name project" />
    </form>
    <form id="form-todo">
      <input id="title" type="text" name="title" placeholder="title" required />
      <input
        id="due-date"
        type="date"
        name="due-date"
        placeholder="data"
        required
      />
      <textarea
        id="description"
        name="description"
        placeholder="description"
        required
      ></textarea>

      <select id="select-todo">
        <option id="priority1" value="low">low</option>
        <option id="priority2" value="medium">Medium</option>
        <option id="priority3" value="high">High</option>
        <input id="done" type="checkbox" name="done" />
      </select>

      <button type="submit" id="add">ADD</button>
    </form>

    <div id="side-bar"></div>
  </body>
</html>
